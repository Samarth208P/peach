[package]
name = "peach_contracts"
edition = "2024"

[dependencies]
# Sui framework — override to resolve conflicts with transitive dep version pins
Sui = { git = "https://github.com/MystenLabs/sui.git", subdir = "crates/sui-framework/packages/sui-framework", rev = "testnet", override = true }

# MoveStdlib — override to unify conflicting versions from DeepBook and Pyth
MoveStdlib = { git = "https://github.com/MystenLabs/sui.git", subdir = "crates/sui-framework/packages/move-stdlib", rev = "testnet", override = true }

# DeepBook V3 — official live package from MystenLabs (name must match package name "deepbook")
deepbook = { git = "https://github.com/MystenLabs/deepbookv3.git", subdir = "packages/deepbook", rev = "main" }

# Wormhole — local copy (Move.toml symlink resolved)
# Published: 0xf47329f4344f3bf0f8e436e2f7b485466cff300f12a166563995d3888c296a94
Wormhole = { local = "../wormhole_sdk/sui/wormhole" }

# Pyth Network — local copy (Move.toml symlink resolved)
# Published: 0xabf837e98c26087cba0883c0a7a28326b1fa3c5e1e2c5abdb486f9e8f594c837
Pyth = { local = "../pyth_sdk/target_chains/sui/contracts" }

[addresses]
peach_contracts = "0x0"
pyth            = "0xabf837e98c26087cba0883c0a7a28326b1fa3c5e1e2c5abdb486f9e8f594c837"
wormhole        = "0xf47329f4344f3bf0f8e436e2f7b485466cff300f12a166563995d3888c296a94"
